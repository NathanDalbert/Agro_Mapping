
spring.application.name=Agro_Mapping
server.port=8090

spring.datasource.url=${URL_BANCO:jdbc:postgresql://localhost:5432/AgroMapping}
spring.datasource.username=${USUARIO:postgres}
spring.datasource.password=${SENHA:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

agro-mapping.token.secret=${SECRET_KEY:mySecretKeyForAgroMapping2024VeryLongSecretForJWT}

springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}

